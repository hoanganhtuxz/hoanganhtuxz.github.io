name: Deploy Next.js to Pages

on:
  push:
    branches: ["main"] # Tự chạy khi bạn push lên nhánh main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install
      - name: Build
        run: npx next build
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js 16 sẽ xuất file vào đây
      - name: Deploy
        uses: actions/deploy-pages@v4
